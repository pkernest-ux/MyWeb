<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Ernest Huang</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=label-fix" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html"><span class="brand-mark"></span><span>Ernest Huang</span></a>
        <nav class="nav admin-nav" aria-label="Admin navigation">
          <a href="./index.html">View Site</a>
          <a href="https://github.com/pkernest-ux/MyWeb/actions">Deployments</a>
          <a class="nav-cta" href="/.auth/logout?post_logout_redirect_uri=/admin.html">Logout</a>
        </nav>
      </header>

      <main>
        <section class="admin-hero admin-compact-hero section">
          <p class="system-label"><span></span> Content Control</p>
          <h1>後台管理</h1>
          <p class="hero-lede">
            從左側選擇要維護的頁面，右側只顯示該頁可編輯的文字欄位。儲存後會更新 content.json，並由 Azure 自動重新部署。
          </p>
        </section>

        <section class="section admin-section">
          <div class="admin-workspace glass-card">
            <aside class="admin-sidebar" aria-label="Page list">
              <div class="admin-sidebar-header">
                <p class="system-label"><span></span> Pages</p>
                <h2>網頁列表</h2>
              </div>
              <div id="cms-page-list" class="cms-page-list"></div>
            </aside>

            <form id="cms-form" class="cms-form">
              <div class="cms-editor-header">
                <div>
                  <p class="system-label"><span></span> Page Settings</p>
                  <h2 id="cms-page-title">載入中</h2>
                  <p id="cms-page-description">請稍候，正在讀取內容。</p>
                </div>
                <button id="cms-preview-button" class="button ghost" type="button">預覽草稿</button>
              </div>

              <p id="cms-status" class="cms-status" role="status">Loading content...</p>
              <div id="cms-fields" class="cms-fields"></div>

              <div class="admin-form-actions">
                <button id="cms-draft-button" class="button ghost" type="button">儲存草稿</button>
                <button class="button primary" type="submit">變更上架</button>
                <button id="cms-reset-button" class="button ghost" type="button">放棄草稿</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script src="./admin-cms.js?v=field-clarity"></script>
  </body>
</html>
