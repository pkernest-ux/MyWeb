<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Ernest Huang</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html"><span class="brand-mark"></span><span>Ernest Huang</span></a>
        <nav class="nav admin-nav" aria-label="Admin navigation">
          <a href="./index.html">View Site</a>
          <a href="https://github.com/pkernest-ux/MyWeb/actions">Deployments</a>
          <a class="nav-cta" href="/.auth/logout?post_logout_redirect_uri=/admin.html">Logout</a>
        </nav>
      </header>

      <main>
        <section class="admin-hero section">
          <p class="system-label"><span></span> Content Control</p>
          <h1>前台資訊維護項目</h1>
          <p class="hero-lede">
            直接編輯下方欄位並儲存。系統會把內容寫入 content.json，並觸發 Azure 自動部署。
          </p>
        </section>

        <section class="section admin-section">
          <form id="cms-form" class="cms-form glass-card">
            <p id="cms-status" class="cms-status" role="status">Loading content...</p>
            <div class="admin-form-actions">
              <button class="button primary" type="submit">Save Content</button>
              <a class="button ghost" href="./index.html">Preview Site</a>
            </div>
          </form>

          <div class="admin-guide glass-card">
            <p class="system-label"><span></span> Workflow</p>
            <h2>維護流程</h2>
            <ol>
              <li>修改欄位內容。</li>
              <li>按 Save Content 儲存。</li>
              <li>等待 GitHub Actions / Azure 部署完成，通常約 1 到 3 分鐘。</li>
              <li>回前台重新整理頁面確認內容。</li>
            </ol>
          </div>
        </section>
      </main>
    </div>
    <script src="./admin-cms.js"></script>
  </body>
</html>
